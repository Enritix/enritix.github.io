<script type="module" src="https://unpkg.com/@lottiefiles/dotlottie-wc@latest/dist/dotlottie-wc.js"></script>
<style>
  :root {
    --bg:#0c0c0b;--bg2:#131312;--bg3:#1a1a18;
    --line:rgba(255,255,255,0.07);--line2:rgba(255,255,255,0.14);
    --text:#f0ede6;--muted:#8a8880;--accent:#c8f060;--accent2:#e8d5a3;
    --serif:'DM Serif Display',Georgia,serif;
    --sans:'DM Sans',system-ui,sans-serif;
    --mono:'DM Mono',monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:16px;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased}

  /* NAV */
  nav{position:fixed;top:0;left:0;right:0;z-index:200;display:flex;align-items:center;justify-content:space-between;padding:1.25rem 2.5rem;background:rgba(12,12,11,.85);backdrop-filter:blur(12px);border-bottom:1px solid var(--line)}
  .nav-logo{font-family:var(--mono);font-size:.85rem;letter-spacing:.05em;color:var(--accent);text-decoration:none;font-weight:500}
  .nav-links{display:flex;gap:2rem;list-style:none}
  .nav-links a{font-family:var(--mono);font-size:.78rem;letter-spacing:.08em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .2s}
  .nav-links a:hover,.nav-links a.active{color:var(--text)}
  .nav-cta{font-family:var(--mono);font-size:.78rem;letter-spacing:.08em;color:var(--bg);background:var(--accent);border:none;padding:.45rem 1.1rem;border-radius:2px;cursor:pointer;text-decoration:none;font-weight:500;transition:opacity .2s}
  .nav-cta:hover{opacity:.85}
  .nav-burger{display:none;width:40px;height:40px;cursor:pointer;background:none;border:none;padding:0;position:relative;z-index:210;align-items:center;justify-content:center;color:var(--accent)}
  .nav-burger svg path{fill:var(--accent)}
  .nav-burger #burger-lottie{fill:var(--accent)}
  dotlottie-player{--lottie-fill-color:var(--accent);--lottie-stroke-color:var(--accent)}
  #animation-container #animation svg{fill:var(--accent) !important}
  .nav-burger canvas{display:block;width:40px !important;height:40px !important}
  .drawer-overlay{display:none;position:fixed;inset:0;z-index:190;background:rgba(0,0,0,.6);backdrop-filter:blur(4px);opacity:0;pointer-events:none}
  .drawer-overlay.active{display:block;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;bottom:0;z-index:195;width:min(380px,100vw);background:var(--bg2);border-left:1px solid var(--line2);display:flex;flex-direction:column;padding:5rem 2.5rem 2.5rem;opacity:1;pointer-events:none;will-change:transform}
  .drawer-links{list-style:none;display:flex;flex-direction:column;gap:0;flex:1}
  .drawer-links li{overflow:hidden;border-bottom:1px solid var(--line);width:100%}
  .drawer-links a{font-family:var(--serif);font-size:clamp(1.6rem,5vw,2rem);font-weight:400;color:var(--muted);text-decoration:none;letter-spacing:-.01em;display:flex;align-items:center;justify-content:space-between;padding:1.1rem 0;transition:color .2s;width:100%;min-height:72px}
  .drawer-links a:hover{color:var(--text)}
  .drawer-num{font-family:var(--mono);font-size:.65rem;letter-spacing:.1em;color:var(--line2);align-self:flex-start;margin-top:.3rem}
  .drawer-cta{margin-top:2rem;font-family:var(--mono);font-size:.8rem;letter-spacing:.08em;color:var(--bg);background:var(--accent);border:none;padding:.9rem 1.6rem;border-radius:2px;cursor:pointer;text-decoration:none;font-weight:500;display:block;text-align:center}
  .drawer-socials{display:flex;gap:1.25rem;margin-top:1.5rem;padding-top:1.5rem;border-top:1px solid var(--line)}
  .drawer-socials a{font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;color:var(--muted);text-decoration:none;text-transform:uppercase;transition:color .2s}
  .drawer-socials a:hover{color:var(--accent)}
  @media(max-width:720px){
    nav{padding:1rem 1.5rem}
    .nav-links,.nav-cta-wrap{display:none}
    .nav-burger{display:flex}
  }
  @media(max-width:520px){.drawer{width:100vw;border-left:none}}
  @media(max-width:720px){.drawer-links,.drawer-links li,.drawer-links a{width:100%}}
  @media(min-width:721px){.drawer,.drawer-overlay{display:none !important}}

  /* PAGE HEADER */
  .page-header{padding:9rem 2.5rem 4rem;border-bottom:1px solid var(--line);position:relative;overflow:hidden}
  .page-header-grid{position:absolute;inset:0;background-image:linear-gradient(var(--line) 1px,transparent 1px),linear-gradient(90deg,var(--line) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 20%,transparent 100%)}
  .section-label{font-family:var(--mono);font-size:.72rem;letter-spacing:.15em;text-transform:uppercase;color:var(--accent);margin-bottom:1rem;display:flex;align-items:center;gap:.6rem}
  .section-label::before{content:'';width:32px;height:1px;background:var(--accent)}
  .page-title{font-family:var(--serif);font-size:clamp(2.5rem,6vw,5rem);font-weight:400;line-height:1.05;letter-spacing:-.02em}
  .page-title em{color:var(--accent2);font-style:italic}
  @media(max-width:720px){.page-header{padding:7rem 1.5rem 3rem}}

  /* FILTERS */
  .filters-bar{padding:1.5rem 2.5rem;border-bottom:1px solid var(--line);display:flex;gap:.5rem;flex-wrap:wrap;align-items:center}
  .filter-btn{font-family:var(--mono);font-size:.7rem;letter-spacing:.08em;text-transform:uppercase;padding:.35rem .9rem;border:1px solid var(--line2);border-radius:2px;background:var(--bg2);color:var(--text);cursor:pointer;transition:border-color .2s,background .2s,color .2s,transform .2s}
  .filter-btn:hover{border-color:rgba(255,255,255,.35);background:var(--bg3)}
  .filter-btn.active{background:var(--accent);color:var(--bg);border-color:var(--accent)}
  @media(max-width:720px){.filters-bar{padding:1.25rem 1.5rem}}

  /* SKELETON */
  @keyframes shimmer{0%{background-position:-400px 0}100%{background-position:400px 0}}
  .skeleton{background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite;border-radius:2px}

  /* GRID */
  .projects-section{padding:3rem 2.5rem 6rem}
  @media(max-width:720px){.projects-section{padding:2rem 1.5rem 4rem}}
  .projects-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:1px;background:var(--line);border:1px solid var(--line)}
  .projects-grid.loading{background:transparent;border-color:transparent;gap:16px}

  /* SKELETON CARD */
  .project-card-skeleton{background:var(--bg2);padding:0;overflow:hidden}
  .skeleton-img{height:180px;background:linear-gradient(90deg,var(--bg2) 25%,var(--bg3) 50%,var(--bg2) 75%);background-size:800px 100%;animation:shimmer 1.4s infinite}
  .skeleton-body{padding:1.5rem;display:flex;flex-direction:column;gap:.75rem}
  .skeleton-line{height:10px;border-radius:2px}
  .skeleton-title{height:16px;border-radius:2px;width:70%}

  /* CARDS */
  .project-card{background:var(--bg2);overflow:hidden;display:flex;flex-direction:column;cursor:pointer;transition:background .2s}
  .project-card:hover{background:var(--bg3)}
  .project-card.hidden{display:none}
  .project-img{aspect-ratio:16/9;overflow:hidden;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--line)}
  .project-img-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:8px}
  .project-body{padding:1.5rem;flex:1;display:flex;flex-direction:column;gap:.6rem}
  .project-tags{display:flex;flex-wrap:wrap;gap:.4rem}
  .tag{font-family:var(--mono);font-size:.65rem;letter-spacing:.08em;background:var(--bg3);border:1px solid var(--line2);color:var(--muted);padding:.2rem .55rem;border-radius:2px;text-transform:uppercase}
  .project-meta{display:flex;gap:.75rem;align-items:center}
  .project-year{font-family:var(--mono);font-size:.68rem;color:var(--muted);letter-spacing:.05em}
  .project-title{font-size:1.05rem;font-weight:500;color:var(--text);line-height:1.3}
  .project-desc{font-size:.85rem;color:var(--muted);line-height:1.6;flex:1}
  .project-link{font-family:var(--mono);font-size:.75rem;letter-spacing:.08em;color:var(--accent);text-decoration:none;text-transform:uppercase;margin-top:.5rem;display:flex;align-items:center;gap:.35rem;transition:gap .2s;background:none;border:none;cursor:pointer;padding:0}
  .project-link:hover{gap:.6rem}

  /* EMPTY STATE */
  .empty-state{grid-column:1/-1;padding:5rem 2rem;text-align:center;color:var(--muted);font-family:var(--mono);font-size:.85rem;letter-spacing:.05em}

  /* FOOTER */
  footer{padding:2.5rem;display:flex;flex-wrap:wrap;justify-content:space-between;align-items:center;gap:1rem;border-top:1px solid var(--line)}
  .footer-left{font-family:var(--mono);font-size:.72rem;color:var(--muted);letter-spacing:.05em}
  .footer-left span{color:var(--text)}
  .footer-right{display:flex;gap:1.25rem}
  .footer-right a{font-family:var(--mono);font-size:.72rem;color:var(--muted);text-decoration:none;letter-spacing:.05em;transition:color .2s}
  .footer-right a:hover{color:var(--accent)}
  @media(max-width:720px){footer{padding:2rem 1.5rem}}

  /* REVEAL */
  
  
  @media(prefers-reduced-motion:reduce){*{animation-duration:.01ms !important;transition-duration:.01ms !important}}

  body::after{content:'';position:fixed;inset:0;pointer-events:none;z-index:9999;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");opacity:.35}

  /* ── Custom cursor ──────────────────────────────────────── */
  @media (hover: hover) and (pointer: fine) {
    * { cursor: none !important; }
    input, textarea { cursor: text !important; }
    #cur-dot {
      position: fixed; top: 0; left: 0; z-index: 99999;
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--accent);
      pointer-events: none; will-change: transform; opacity: 0;
    }
    #cur-ring {
      position: fixed; top: 0; left: 0; z-index: 99998;
      width: 36px; height: 36px; border-radius: 50%;
      border: 1.5px solid rgba(200, 240, 96, 0.4);
      pointer-events: none; will-change: transform; opacity: 0;
      display: flex; align-items: center; justify-content: center;
      transition: width .4s cubic-bezier(.23,1,.32,1),
                  height .4s cubic-bezier(.23,1,.32,1),
                  background .3s, border-color .3s;
    }
    #cur-label {
      font-family: var(--mono); font-size: .58rem;
      letter-spacing: .1em; color: var(--bg);
      text-transform: uppercase; white-space: nowrap;
      opacity: 0; transition: opacity .2s;
    }
    body.cur-link #cur-ring { width: 52px; height: 52px; border-color: rgba(200,240,96,.9); }
    body.cur-view #cur-ring { width: 74px; height: 74px; background: rgba(200,240,96,.1); border-color: var(--accent); }
    body.cur-view #cur-label { opacity: 1; }
  }
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

<script>
(function () {
  gsap.registerPlugin(ScrollTrigger);

  /* ── Utilities ───────────────────────────────────── */
  function addUnderlineHover(els) {
    els.forEach(el => {
      if (el.querySelector('.ul-line')) return;
      el.style.position = 'relative';
      const line = document.createElement('span');
      line.className = 'ul-line';
      line.style.cssText = 'position:absolute;bottom:-1px;left:0;height:1px;width:0;background:currentColor;pointer-events:none';
      el.appendChild(line);
      const ln = el.querySelector('.ul-line');
      el.addEventListener('mouseenter', () => gsap.to(ln, { width: '100%', duration: .3, ease: 'power2.out' }));
      el.addEventListener('mouseleave', () => gsap.to(ln, { width: 0, duration: .25, ease: 'power2.in' }));
    });
  }

  function addArrowHover(els) {
    els.forEach(el => {
      el.innerHTML = el.innerHTML.replace(/(→)(?!<)/, '<span class="arrow" style="display:inline-block">→</span>');
      const arrow = el.querySelector('.arrow');
      if (!arrow) return;
      el.addEventListener('mouseenter', () =>
        gsap.timeline()
          .to(arrow, { x: 12, opacity: 0, duration: .17, ease: 'power2.in' })
          .set(arrow, { x: -8 })
          .to(arrow,  { x: 0, opacity: 1, duration: .2, ease: 'power2.out' }));
    });
  }

  function addPrimaryHover(els) {
    els.forEach(el => {
      el.style.position = 'relative'; el.style.overflow = 'hidden';
      const sw = document.createElement('span');
      sw.style.cssText = 'position:absolute;inset:0;background:rgba(0,0,0,.12);transform:scaleX(0);transform-origin:left;pointer-events:none;border-radius:inherit';
      el.appendChild(sw);
      el.addEventListener('mouseenter', () => {
        gsap.fromTo(sw, { scaleX: 0, transformOrigin: 'left' }, { scaleX: 1, duration: .3, ease: 'power2.out' });
        gsap.to(el, { scale: 1.04, y: -2, duration: .2, ease: 'back.out(2)' });
      });
      el.addEventListener('mouseleave', () => {
        gsap.to(sw, { scaleX: 0, transformOrigin: 'right', duration: .28, ease: 'power2.in' });
        gsap.to(el, { scale: 1, y: 0, duration: .22, ease: 'power2.inOut' });
      });
      el.addEventListener('mousedown', () => gsap.to(el, { scale: .96, duration: .1 }));
      el.addEventListener('mouseup',   () => gsap.to(el, { scale: 1.04, duration: .14, ease: 'back.out(2)' }));
    });
  }

  /* ── Drawer nav + Lottie burger ──────────────────── */
  const burger  = document.getElementById('burger');
  const drawer  = document.getElementById('drawer');
  const overlay = document.getElementById('drawer-overlay');
  const lottiePlayer = document.getElementById('burger-lottie');
  let dotLottieInstance = null;
  let drawerOpen = false;

  function setupDrawer() {
    gsap.set(drawer, { xPercent: 100 });
    gsap.set(overlay, { opacity: 0 });
    drawer.style.pointerEvents = 'none';
  }

  function initLottie() {
    if (!lottiePlayer) return;
    const tryGetInstance = () => {
      dotLottieInstance = lottiePlayer.dotLottie;
      if (!dotLottieInstance) requestAnimationFrame(tryGetInstance);
    };
    if (window.customElements) {
      window.customElements.whenDefined('dotlottie-wc').then(tryGetInstance);
    } else {
      requestAnimationFrame(tryGetInstance);
    }
  }

  function playLottie(mode) {
    if (!dotLottieInstance && lottiePlayer) dotLottieInstance = lottiePlayer.dotLottie;
    if (!dotLottieInstance) return;
    dotLottieInstance.setMode(mode);
    dotLottieInstance.setSpeed(2.5);
    if (typeof dotLottieInstance.setFrame === 'function') dotLottieInstance.setFrame(0);
    dotLottieInstance.play();
  }

  initLottie();

  function openDrawer() {
    drawerOpen = true;
    burger.setAttribute('aria-expanded', 'true');
    overlay.classList.add('active');
    document.body.style.overflow = 'hidden';
    drawer.style.pointerEvents = 'auto';
    playLottie('forward');
    gsap.to(overlay, { opacity: 1, duration: 0.3, ease: 'power2.out' });
    gsap.to(drawer, { xPercent: 0, duration: 0.45, ease: 'power4.out' });
    gsap.fromTo(
      drawer.querySelectorAll('.drawer-link, .drawer-cta, .drawer-socials'),
      { opacity: 0, x: 30 },
      { opacity: 1, x: 0, stagger: 0.05, duration: 0.35, delay: 0.12, ease: 'power2.out', overwrite: true }
    );
  }

  function closeDrawer() {
    drawerOpen = false;
    burger.setAttribute('aria-expanded', 'false');
    document.body.style.overflow = '';
    playLottie('reverse');
    gsap.to(overlay, { opacity: 0, duration: 0.25, ease: 'power2.out',
      onComplete: () => overlay.classList.remove('active') });
    gsap.to(drawer, { xPercent: 100, duration: 0.42, ease: 'power3.inOut',
      onComplete: () => { drawer.style.pointerEvents = 'none'; } });
  }

  burger.addEventListener('click', () => drawerOpen ? closeDrawer() : openDrawer());
  overlay.addEventListener('click', closeDrawer);
  drawer.querySelectorAll('.drawer-link').forEach(a => a.addEventListener('click', closeDrawer));

  setupDrawer();

  drawer.querySelectorAll('li a').forEach(el => {
    el.addEventListener('mouseenter', () => {
      gsap.to(el, { x: 6, duration: .2, ease: 'power2.out' });
      const num = el.querySelector('.drawer-num');
      if (num) gsap.to(num, { color: 'var(--accent)', duration: .2 });
    });
    el.addEventListener('mouseleave', () => {
      gsap.to(el, { x: 0, duration: .22, ease: 'power2.inOut' });
      const num = el.querySelector('.drawer-num');
      if (num) gsap.to(num, { color: 'rgba(255,255,255,.14)', duration: .2 });
    });
  });

  /* ── Page header ──────────────────────────────────── */
  gsap.from('nav', { y: -20, opacity: 0, duration: .6, ease: 'power3.out', delay: .1 });

  gsap.timeline({ defaults: { ease: 'power3.out' }, delay: .25 })
    .fromTo('.section-label', { opacity: 0, x: -20 }, { opacity: 1, x: 0, duration: .5 })
    .fromTo('.page-title',    { opacity: 0, y: 28  }, { opacity: 1, y: 0, duration: .65 }, '-=.25');

  gsap.fromTo('.filters-bar',
    { opacity: 0, y: 12 },
    { opacity: 1, y: 0, duration: .5, delay: .6, ease: 'power2.out' });

  /* ── Filter button interactions ───────────────────── */
  function bindFilterHover() {
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('mouseenter', () => gsap.to(btn, { y: -2, scale: 1.04, duration: .16, ease: 'back.out(2)' }));
      btn.addEventListener('mouseleave', () => gsap.to(btn, { y:  0, scale: 1,    duration: .2,  ease: 'power2.inOut' }));
      btn.addEventListener('mousedown',  () => gsap.to(btn, { scale: .94, duration: .08 }));
      btn.addEventListener('mouseup',    () => gsap.to(btn, { scale: 1.04, duration: .14, ease: 'back.out(2)' }));
    });
  }

  const grid = document.getElementById('grid');
  const filtersBar = document.getElementById('filters-bar');
  let activeFilter = 'all';

  function loadProjects() {
    return new Promise(resolve => setTimeout(() => resolve(PROJECTS), 600));
  }

  function buildCard(p) {
    const card = document.createElement('div');
    card.className = 'project-card';
    card.dataset.type = p.type;
    card.setAttribute('role', 'article');
    card.setAttribute('tabindex', '0');
    card.style.opacity = '0';
    card.innerHTML = `
      <div class="project-img">
        <div class="project-img-placeholder" style="background:${p.gradient};width:100%;height:100%">
          <span style="font-family:'DM Serif Display',serif;font-size:1.4rem;letter-spacing:-.02em;color:${p.accent}">${p.title}</span>
          <span style="font-family:'DM Mono',monospace;font-size:.7rem;color:#8a8880">${p.type}</span>
        </div>
      </div>
      <div class="project-body">
        <div class="project-meta">
          <div class="project-tags">${p.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
          <span class="project-year">${p.year}</span>
        </div>
        <div class="project-title">${p.title}</div>
        <div class="project-desc">${p.summary}</div>
        <button class="project-link" data-id="${p.id}">View project →</button>
      </div>`;

    card.addEventListener('mouseenter', () => gsap.to(card, { y: -5, scale: 1.01, duration: .22, ease: 'power2.out' }));
    card.addEventListener('mouseleave', () => gsap.to(card, { y:  0, scale: 1,    duration: .28, ease: 'power2.inOut' }));
    card.addEventListener('click', () => navigate(p.id));
    card.addEventListener('keydown', e => { if (e.key === 'Enter' || e.key === ' ') navigate(p.id); });

    const linkBtn = card.querySelector('.project-link');
    linkBtn.addEventListener('click', e => { e.stopPropagation(); navigate(p.id); });
    // Arrow fly-through after card is in DOM (deferred)
    setTimeout(() => addArrowHover([linkBtn]), 0);
    return card;
  }

  function navigate(id) { window.location.href = `project.html?id=${id}`; }

  function buildFilters(projects) {
    const types = ['all', ...new Set(projects.map(p => p.type))];
    types.forEach(type => {
      const btn = document.createElement('button');
      btn.className = 'filter-btn' + (type === 'all' ? ' active' : '');
      btn.textContent = type === 'all' ? 'All' : type;
      btn.dataset.filter = type;
      btn.addEventListener('click', () => {
        activeFilter = type;
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.toggle('active', b.dataset.filter === type));
        applyFilter();
      });
      filtersBar.appendChild(btn);
    });
    gsap.fromTo(filtersBar.querySelectorAll('.filter-btn'),
      { y: 10, opacity: 1 },
      { y: 0, stagger: .05, duration: .35, ease: 'power2.out', delay: .1 });
    bindFilterHover();
  }

  function applyFilter() {
    document.querySelectorAll('.project-card').forEach(card => {
      const match = activeFilter === 'all' || card.dataset.type === activeFilter;
      if (match) {
        card.classList.remove('hidden');
        gsap.to(card, { opacity: 1, y: 0, duration: .3, ease: 'power2.out' });
      } else {
        gsap.to(card, { opacity: 0, y: 8, duration: .2, ease: 'power2.in',
          onComplete: () => card.classList.add('hidden') });
      }
    });
  }

  loadProjects().then(projects => {
    grid.classList.remove('loading');
    grid.innerHTML = '';
    buildFilters(projects);
    projects.forEach((p, i) => {
      const card = buildCard(p);
      grid.appendChild(card);
      gsap.fromTo(card,
        { opacity: 0, y: 32 },
        { opacity: 1, y: 0, duration: .55, delay: (i % 3) * .09, ease: 'power3.out',
          scrollTrigger: { trigger: card, start: 'top 92%', once: true } });
    });
    // Nav link underlines
    addUnderlineHover(document.querySelectorAll('.nav-links a'));
    addUnderlineHover(document.querySelectorAll('.footer-right a'));
    addPrimaryHover(document.querySelectorAll('.nav-cta'));
  });

  /* ── Custom cursor ─────────────────────────────────────── */
  (function() {
    if (!window.matchMedia('(hover:hover) and (pointer:fine)').matches) return;
    const dot  = document.getElementById('cur-dot');
    const ring = document.getElementById('cur-ring');
    if (!dot || !ring) return;

    gsap.set([dot, ring], { xPercent: -50, yPercent: -50 });
    const xDot  = gsap.quickTo(dot,  'x', { duration: .1,  ease: 'power3' });
    const yDot  = gsap.quickTo(dot,  'y', { duration: .1,  ease: 'power3' });
    const xRing = gsap.quickTo(ring, 'x', { duration: .45, ease: 'power3' });
    const yRing = gsap.quickTo(ring, 'y', { duration: .45, ease: 'power3' });

    let visible = false;
    window.addEventListener('mousemove', e => {
      xDot(e.clientX); yDot(e.clientY);
      xRing(e.clientX); yRing(e.clientY);
      if (!visible) {
        gsap.to([dot, ring], { opacity: 1, duration: .4, overwrite: 'auto' });
        visible = true;
      }
    }, { passive: true });

    document.addEventListener('mouseleave', () => {
      gsap.to([dot, ring], { opacity: 0, duration: .3, overwrite: 'auto' });
      visible = false;
    });
    document.addEventListener('mouseenter', () => {
      gsap.to(ring, { opacity: 1, duration: .3, overwrite: 'auto' });
      if (!document.body.classList.contains('cur-link') &&
          !document.body.classList.contains('cur-view'))
        gsap.to(dot, { opacity: 1, duration: .3, overwrite: 'auto' });
      visible = true;
    });

    const CARD = '.project-card, .related-card';
    const LINK = 'a, button, [role="button"], .filter-btn, .contact-link';

    function setMode(mode) {
      document.body.classList.toggle('cur-link', mode === 'link');
      document.body.classList.toggle('cur-view', mode === 'view');
      gsap.to(dot, { scale: mode ? 0 : 1, duration: .2, ease: 'power2.inOut', overwrite: 'auto' });
    }

    document.addEventListener('mouseover', e => {
      if (e.target.closest(CARD)) setMode('view');
      else if (e.target.closest(LINK)) setMode('link');
      else setMode('');
    }, { passive: true });
  })();
})();
</script>
</body>
</html>
